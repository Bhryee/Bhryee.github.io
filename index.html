<!doctype html>
<html lang="tr" data-theme="light" data-density="regular" data-layout="topnav">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Bahriye İşgör — Portfolyo</title>
  <meta name="description" content="Bahriye İşgör — Bilgisayar Mühendisi. Yazılım geliştirici portfolyosu, projeler, deneyim ve makaleler." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:ital,wght@0,400;0,500;0,600;1,400;1,500&family=JetBrains+Mono:wght@400;500&family=Newsreader:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet" />

  <style>
/* Portfolio — Bahriye İşgör */

:root {
  --accent-h: 217;
  --accent: oklch(0.62 0.18 var(--accent-h));
  --accent-soft: oklch(0.62 0.18 var(--accent-h) / 0.12);
  --accent-fg: oklch(0.98 0 0);

  --section-pad: 96px;
  --gap-lg: 32px;
  --gap-md: 20px;
  --gap-sm: 12px;

  --font-sans: 'Inter', ui-sans-serif, system-ui, -apple-system, 'Helvetica Neue', sans-serif;
  --font-display: 'Inter Tight', 'Inter', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
  --font-body: var(--font-sans);

  --bg: oklch(0.16 0.005 240);
  --bg-elev: oklch(0.20 0.006 240);
  --surface: oklch(0.22 0.007 240);
  --fg: oklch(0.96 0.005 240);
  --fg-muted: oklch(0.72 0.01 240);
  --fg-dim: oklch(0.55 0.012 240);
  --border: oklch(0.30 0.01 240 / 0.55);
  --border-strong: oklch(0.40 0.012 240);
}

[data-theme="light"] {
  --bg: oklch(0.985 0.003 240);
  --bg-elev: oklch(0.97 0.004 240);
  --surface: oklch(0.95 0.005 240);
  --fg: oklch(0.18 0.008 240);
  --fg-muted: oklch(0.42 0.012 240);
  --fg-dim: oklch(0.58 0.012 240);
  --border: oklch(0.86 0.008 240);
  --border-strong: oklch(0.78 0.01 240);
  --accent-soft: oklch(0.62 0.18 var(--accent-h) / 0.10);
}

[data-density="compact"] {
  --section-pad: 64px;
  --gap-lg: 22px;
  --gap-md: 14px;
  --gap-sm: 8px;
}
[data-density="comfy"] {
  --section-pad: 128px;
  --gap-lg: 44px;
  --gap-md: 28px;
  --gap-sm: 16px;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--fg);
  font-size: 16px;
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-feature-settings: 'ss01', 'cv11';
  transition: background 0.25s ease, color 0.25s ease;
}

::selection { background: var(--accent-soft); color: var(--fg); }
a { color: inherit; text-decoration: none; }

.wrap {
  max-width: 880px;
  margin: 0 auto;
  padding: 0 32px;
}

[data-layout="sidebar"] .page-shell {
  display: grid;
  grid-template-columns: 320px 1fr;
  gap: 0;
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 32px;
}
[data-layout="sidebar"] .topnav { display: none; }
[data-layout="sidebar"] .sidebar {
  position: sticky;
  top: 0;
  height: 100vh;
  padding: 80px 40px 40px 0;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
}
[data-layout="sidebar"] .main-content {
  padding: 80px 0 80px 56px;
  max-width: 720px;
}
[data-layout="sidebar"] .main-content .wrap { padding: 0; max-width: none; }
[data-layout="sidebar"] .hero { padding: 0 0 var(--section-pad) 0; min-height: auto; }
[data-layout="sidebar"] .hero-name { font-size: 48px; }
[data-layout="topnav"] .sidebar { display: none; }

.topnav {
  position: sticky;
  top: 0;
  z-index: 50;
  backdrop-filter: blur(16px) saturate(140%);
  -webkit-backdrop-filter: blur(16px) saturate(140%);
  background: color-mix(in oklab, var(--bg) 80%, transparent);
  border-bottom: 1px solid var(--border);
}
.topnav-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  max-width: 880px;
  margin: 0 auto;
  padding: 16px 32px;
}
.topnav-brand {
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -0.01em;
  display: flex;
  align-items: center;
  gap: 10px;
}
.topnav-brand .dot {
  width: 8px; height: 8px;
  background: var(--accent);
  border-radius: 50%;
  display: inline-block;
}
.topnav-links {
  display: flex;
  gap: 4px;
  align-items: center;
}
.topnav-links a {
  font-size: 13px;
  color: var(--fg-muted);
  padding: 6px 10px;
  border-radius: 6px;
  transition: color 0.15s ease, background 0.15s ease;
  position: relative;
}
.topnav-links a:hover { color: var(--fg); }
.topnav-links a.active { color: var(--fg); }
.topnav-links a.active::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 10px; right: 10px;
  height: 1.5px;
  background: var(--accent);
  border-radius: 2px;
}
.topnav-actions {
  display: flex;
  gap: 6px;
  align-items: center;
}
.icon-btn {
  appearance: none;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--fg-muted);
  width: 32px;
  height: 32px;
  border-radius: 8px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.15s ease;
  font-size: 12px;
  font-family: var(--font-mono);
  font-weight: 500;
}
.icon-btn:hover { color: var(--fg); border-color: var(--border-strong); background: var(--surface); }

.sidebar-brand {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -0.02em;
  margin-bottom: 8px;
}
.sidebar-role {
  color: var(--fg-muted);
  font-size: 14px;
  margin-bottom: 32px;
}
.sidebar-nav {
  display: flex;
  flex-direction: column;
  gap: 2px;
  margin-top: 8px;
}
.sidebar-nav a {
  font-size: 13px;
  color: var(--fg-muted);
  padding: 6px 0;
  display: flex;
  align-items: center;
  gap: 12px;
  transition: color 0.15s ease;
}
.sidebar-nav a::before {
  content: '';
  width: 16px;
  height: 1px;
  background: var(--border-strong);
  transition: width 0.2s ease, background 0.2s ease;
}
.sidebar-nav a:hover { color: var(--fg); }
.sidebar-nav a.active { color: var(--fg); }
.sidebar-nav a.active::before { width: 32px; background: var(--accent); }
.sidebar-actions { margin-top: auto; display: flex; gap: 8px; }
.sidebar-socials { margin-top: 24px; display: flex; gap: 14px; }
.sidebar-socials a {
  font-size: 12px;
  color: var(--fg-dim);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  font-family: var(--font-mono);
  transition: color 0.15s;
}
.sidebar-socials a:hover { color: var(--accent); }

.hero {
  padding: 120px 0 var(--section-pad);
  min-height: 75vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}
.hero-eyebrow {
  font-family: var(--font-mono);
  font-size: 12px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--fg-dim);
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.hero-eyebrow::before {
  content: '';
  width: 24px;
  height: 1px;
  background: var(--accent);
}
.hero-name {
  font-family: var(--font-display);
  font-size: clamp(44px, 6.4vw, 72px);
  line-height: 1.02;
  letter-spacing: -0.035em;
  font-weight: 500;
  margin: 0 0 20px;
  color: var(--fg);
}
.hero-name .em {
  color: var(--accent);
  font-style: italic;
  font-weight: 400;
}
.hero-tagline {
  font-size: 19px;
  line-height: 1.55;
  color: var(--fg-muted);
  max-width: 580px;
  margin: 0 0 36px;
  text-wrap: pretty;
}
.hero-cta {
  display: flex;
  gap: 12px;
  align-items: center;
  justify-content: center;
  flex-wrap: wrap;
}
.btn {
  appearance: none;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--fg);
  font: inherit;
  font-size: 13.5px;
  font-weight: 500;
  padding: 10px 16px;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.15s ease;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.btn:hover { border-color: var(--border-strong); transform: translateY(-1px); }
.btn-primary { background: var(--accent); border-color: var(--accent); color: var(--accent-fg); }
.btn-primary:hover { filter: brightness(1.08); }
.btn-ghost { background: transparent; }
.btn .arrow { transition: transform 0.15s ease; }
.btn:hover .arrow { transform: translateX(2px); }

.email-pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--fg-muted);
  padding: 8px 12px;
  border: 1px dashed var(--border-strong);
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.15s ease;
}
.email-pill:hover { color: var(--fg); border-color: var(--accent); border-style: solid; }
.email-pill.copied { color: var(--accent); border-color: var(--accent); border-style: solid; }
.email-pill .copy-ic { opacity: 0.5; }

section.block {
  padding: var(--section-pad) 0;
  border-top: 1px solid var(--border);
  scroll-margin-top: 80px;
}
.section-head {
  display: flex;
  align-items: baseline;
  gap: 16px;
  margin-bottom: var(--gap-lg);
}
.section-num {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--fg-dim);
  letter-spacing: 0.05em;
}
.section-title {
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 500;
  letter-spacing: -0.02em;
  margin: 0;
  color: var(--fg);
}
.section-rule { flex: 1; height: 1px; background: var(--border); align-self: center; }

.about-grid { display: grid; grid-template-columns: 1fr; gap: var(--gap-md); }
.about-grid p { margin: 0; font-size: 16.5px; line-height: 1.7; color: var(--fg-muted); text-wrap: pretty; }

.tl { display: flex; flex-direction: column; gap: var(--gap-md); }
.tl-item {
  display: grid;
  grid-template-columns: 140px 1fr;
  gap: 24px;
  padding: 16px 0;
  border-bottom: 1px solid var(--border);
  transition: padding 0.15s ease;
}
.tl-item:last-child { border-bottom: 0; }
.tl-item:hover { padding-left: 6px; }
.tl-period {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--fg-dim);
  letter-spacing: 0.02em;
  padding-top: 4px;
}
.tl-body h3 {
  font-family: var(--font-display);
  margin: 0 0 4px;
  font-size: 17px;
  font-weight: 500;
  letter-spacing: -0.01em;
  color: var(--fg);
}
.tl-org { font-size: 14px; color: var(--fg-muted); margin-bottom: 8px; }
.tl-org .bullet { color: var(--fg-dim); margin: 0 8px; }
.tl-detail { font-size: 14.5px; color: var(--fg-muted); line-height: 1.6; margin: 0; }
.tl-bullets { margin: 8px 0 0; padding: 0; list-style: none; display: flex; flex-direction: column; gap: 6px; }
.tl-bullets li {
  font-size: 14.5px;
  color: var(--fg-muted);
  line-height: 1.55;
  padding-left: 16px;
  position: relative;
}
.tl-bullets li::before {
  content: '';
  position: absolute;
  left: 0; top: 9px;
  width: 6px; height: 1px;
  background: var(--accent);
}
.tl-stack { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
.chip {
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 4px;
  background: var(--surface);
  color: var(--fg-muted);
  border: 1px solid var(--border);
  letter-spacing: 0.01em;
}

.projects-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--gap-md); }
.proj-card {
  background: var(--bg-elev);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
}
.proj-card:hover { transform: translateY(-2px); border-color: var(--border-strong); box-shadow: 0 8px 24px rgba(0,0,0,0.18); }
.proj-preview {
  aspect-ratio: 16 / 10;
  position: relative;
  background: var(--surface);
  overflow: hidden;
  border-bottom: 1px solid var(--border);
}
.proj-preview::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: repeating-linear-gradient(135deg, transparent 0 14px, color-mix(in oklab, var(--fg) 4%, transparent) 14px 15px);
}
.proj-preview::after {
  content: attr(data-label);
  position: absolute;
  bottom: 12px;
  left: 14px;
  font-family: var(--font-mono);
  font-size: 10.5px;
  color: var(--fg-dim);
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.proj-preview .glyph {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-family: var(--font-display);
  font-size: 48px;
  font-weight: 500;
  color: color-mix(in oklab, var(--fg) 18%, transparent);
  letter-spacing: -0.04em;
  line-height: 1;
}
.proj-preview .accent-mark {
  position: absolute;
  top: 12px; right: 14px;
  width: 6px; height: 6px;
  background: var(--accent);
  border-radius: 50%;
}
.proj-preview .proj-img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.proj-preview:has(.proj-img)::before {
  display: none;
}
.proj-body { padding: 18px 18px 16px; display: flex; flex-direction: column; flex: 1; }
.proj-head { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; margin-bottom: 4px; }
.proj-title { font-family: var(--font-display); font-size: 17px; font-weight: 500; letter-spacing: -0.01em; margin: 0; color: var(--fg); }
.proj-year { font-family: var(--font-mono); font-size: 11.5px; color: var(--fg-dim); }
.proj-tagline { font-size: 14px; color: var(--fg-muted); margin: 0 0 12px; line-height: 1.5; }
.proj-desc { font-size: 13.5px; color: var(--fg-muted); margin: 0 0 16px; line-height: 1.55; text-wrap: pretty; }
.proj-foot {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: auto;
  padding-top: 14px;
  border-top: 1px solid var(--border);
  gap: 12px;
}
.proj-stack { display: flex; flex-wrap: wrap; gap: 5px; }
.proj-links { display: flex; gap: 10px; align-items: center; }
.proj-links a {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--fg-muted);
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 6px;
  border-radius: 5px;
  transition: color 0.15s ease, background 0.15s ease;
}
.proj-links a:hover { color: var(--accent); background: var(--accent-soft); }

.proj-filters {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: var(--gap-lg);
}
.proj-filter-btn {
  appearance: none;
  background: var(--bg-elev);
  border: 1px solid var(--border);
  color: var(--fg-muted);
  font: inherit;
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 6px 14px;
  border-radius: 999px;
  cursor: pointer;
  transition: all 0.15s ease;
  letter-spacing: 0.02em;
}
.proj-filter-btn:hover { color: var(--fg); border-color: var(--border-strong); }
.proj-filter-btn.active { background: var(--accent); border-color: var(--accent); color: var(--accent-fg); }

.tech-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(88px, 1fr));
  gap: var(--gap-sm);
}
.tech-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  padding: 18px 8px 14px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--bg-elev);
  transition: border-color 0.15s ease, transform 0.15s ease, box-shadow 0.15s ease;
}
.tech-item:hover {
  border-color: var(--border-strong);
  transform: translateY(-2px);
  box-shadow: 0 4px 16px rgba(0,0,0,0.12);
}
.tech-item img {
  width: 36px;
  height: 36px;
  object-fit: contain;
}
.tech-name {
  font-family: var(--font-mono);
  font-size: 10.5px;
  color: var(--fg-muted);
  text-align: center;
  letter-spacing: 0.01em;
  line-height: 1.3;
}

.articles { display: flex; flex-direction: column; }
.article {
  display: grid;
  grid-template-columns: 80px 1fr auto;
  gap: 24px;
  padding: 22px 0;
  border-bottom: 1px solid var(--border);
  align-items: baseline;
  cursor: pointer;
  transition: padding 0.18s ease;
  color: inherit;
}
.article:first-child { padding-top: 0; }
.article:hover { padding-left: 6px; }
.article:hover .article-title { color: var(--accent); }
.article-meta { font-family: var(--font-mono); font-size: 11.5px; color: var(--fg-dim); letter-spacing: 0.02em; }
.article-title {
  font-family: var(--font-display);
  font-size: 19px;
  font-weight: 500;
  letter-spacing: -0.015em;
  margin: 0 0 6px;
  color: var(--fg);
  transition: color 0.15s ease;
}
.article-excerpt { font-size: 14px; color: var(--fg-muted); margin: 0; line-height: 1.55; }
.article-arrow { color: var(--fg-dim); font-family: var(--font-mono); transition: transform 0.15s ease, color 0.15s ease; font-size: 16px; }
.article:hover .article-arrow { transform: translate(3px, -3px); color: var(--accent); }

.foot { border-top: 1px solid var(--border); padding: 48px 0 64px; }
.foot-inner {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--fg-dim);
  flex-wrap: wrap;
  gap: 16px;
}
.foot-socials { display: flex; gap: 18px; }
.foot-socials a { color: var(--fg-muted); transition: color 0.15s ease; letter-spacing: 0.03em; }
.foot-socials a:hover { color: var(--accent); }

.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--fg);
  color: var(--bg);
  padding: 10px 18px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 500;
  box-shadow: 0 8px 24px rgba(0,0,0,0.25);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s ease, transform 0.2s ease;
  z-index: 100;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

.reveal { opacity: 0; transform: translateY(12px); transition: opacity 0.55s ease, transform 0.55s ease; }
.reveal.in { opacity: 1; transform: translateY(0); }

@media (max-width: 760px) {
  .wrap { padding: 0 22px; }
  .topnav-inner { padding: 14px 22px; }
  .topnav-links { display: none; }
  .projects-grid { grid-template-columns: 1fr; }
  .tl-item { grid-template-columns: 1fr; gap: 6px; }
  .tl-period { padding-top: 0; }
  .article { grid-template-columns: 1fr auto; }
  .article-meta { display: none; }
  .hero { padding-top: 64px; min-height: auto; padding-left: 0; }
  [data-layout="sidebar"] .page-shell { grid-template-columns: 1fr; }
  [data-layout="sidebar"] .sidebar { position: static; height: auto; padding: 32px 0; border-right: 0; border-bottom: 1px solid var(--border); }
  [data-layout="sidebar"] .main-content { padding: 32px 0; }
}
  </style>
</head>
<body>
  <div id="root"></div>

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = { x: startRight - (ev.clientX - sx), y: startBottom - (ev.clientY - sy) };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" onMouseDown={(e) => e.stopPropagation()} onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ label }) {

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);

  if (!fitsAsSegments) {
    return (
      <TweakRow label={label}>
        <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
          {options.map((o) => {
            const v = typeof o === 'object' ? o.value : o;
            const l = typeof o === 'object' ? o.label : o;
            return <option key={v} value={v}>{l}</option>;
          })}
        </select>
      </TweakRow>
    );
  }

  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`, width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" value={value} onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero] = colors;
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

Object.assign(window, { useTweaks, TweaksPanel, TweakSection, TweakRow, TweakRadio, TweakColor });

        <p className="proj-tagline">{p.tagline[lang]}</p>
        <p className="proj-desc">{p.description[lang]}</p>
        <div className="proj-foot">
          <div className="proj-stack">
            {p.stack.slice(0, 4).map((s) => <span className="chip" key={s}>{s}</span>)}
          </div>
          <div className="proj-links">
            <a href={p.github} target="_blank" rel="noopener" aria-label="GitHub">
              {Icons.github(13)}<span>Code</span>
            </a>
            {p.live && (
              <a href={p.live} target="_blank" rel="noopener" aria-label="Live">
                {Icons.external(11)}<span>Live</span>
              </a>
            )}
          </div>
        </div>
      </div>
    </article>
  );
}

          {D.technologies.map((t) => (

              <span className="tech-name">{t.name}</span>

function Projects({ lang }) {

  const categories = [
    { key: 'all',           label: { tr: 'Hepsi',         en: 'All' } },
    { key: 'yapay-zeka',    label: { tr: 'Yapay Zeka',    en: 'AI' } },
    { key: 'python',        label: { tr: 'Python',         en: 'Python' } },
    { key: 'flutter',       label: { tr: 'Flutter',        en: 'Flutter' } },
    { key: 'unreal-engine', label: { tr: 'Unreal Engine',  en: 'Unreal Engine' } },
  ];
  const filtered = filter === 'all'
    ? D.projects
    : D.projects.filter((p) => p.tags && p.tags.includes(filter));
  return (
    <section className="block reveal" id="projects">
      <div className="wrap">
        <SectionHead num="06" title={lang === 'tr' ? 'Projeler' : 'Projects'} />
        <div className="proj-filters">
          {categories.map((c) => (
            <button
              key={c.key}

        <div className="projects-grid">
          {filtered.map((p) => <ProjectCard key={p.title} p={p} lang={lang} idx={D.projects.indexOf(p)} />)}

function Articles({ lang }) {
  return (
    <section className="block reveal" id="articles">
      <div className="wrap">
        <SectionHead num="07" title={lang === 'tr' ? 'Makaleler' : 'Articles'} />
        <div className="articles">
          {D.articles.map((a, i) => (
            <a className="article" key={i} href={a.url} target="_blank" rel="noopener">

function Foot({ lang }) {
  return (
    <footer className="foot">
      <div className="wrap foot-inner">
        <div>© {new Date().getFullYear()} {D.name} · {lang === 'tr' ? 'Sevgiyle yapıldı' : 'Made with care'}</div>
        <div className="foot-socials">
          <a href={D.social.github} target="_blank" rel="noopener">GITHUB</a>
          <a href={D.social.linkedin} target="_blank" rel="noopener">LINKEDIN</a>
          <a href={D.social.medium} target="_blank" rel="noopener">MEDIUM</a>

function Toast() {
  const [msg, setMsg] = useState('');
  const [show, setShow] = useState(false);
  useEffect(() => {
    const onShow = (e) => {
      setMsg(e.detail);
      setShow(true);
      setTimeout(() => setShow(false), 1800);
    };
    window.addEventListener('show-toast', onShow);
    return () => window.removeEventListener('show-toast', onShow);
  }, []);
  return <div className={`toast ${show ? 'show' : ''}`}>{msg}</div>;
}

const ACCENTS = {
  '#3b82f6': { h: 217 },
  '#f97316': { h: 50 },
  '#22c55e': { h: 155 },
  '#a855f7': { h: 295 },
  '#ef4444': { h: 25 },
  '#9ca3af': { h: 240, mono: true },
};

function PortfolioTweaks({ tweaks, setTweak }) {
  return (
    <TweaksPanel>
      <TweakSection label="Görünüm" />
      <TweakRadio label="Tema" value={tweaks.theme} options={['light', 'dark']} onChange={(v) => setTweak('theme', v)} />
      <TweakRadio label="Layout" value={tweaks.layout} options={['topnav', 'sidebar']} onChange={(v) => setTweak('layout', v)} />
      <TweakRadio label="Yoğunluk" value={tweaks.density} options={['compact', 'regular', 'comfy']} onChange={(v) => setTweak('density', v)} />
      <TweakSection label="Vurgu rengi" />
      <TweakColor label="Accent" value={tweaks.accentKey}
        options={['#3b82f6', '#f97316', '#22c55e', '#a855f7', '#ef4444', '#9ca3af']}
        onChange={(v) => setTweak('accentKey', v)} />
      <TweakSection label="Tipografi" />
      <TweakRadio label="Yazı tipi" value={tweaks.fontFamily} options={['sans', 'serif', 'mono']} onChange={(v) => setTweak('fontFamily', v)} />
      <TweakRadio label="Dil" value={tweaks.lang} options={['tr', 'en']} onChange={(v) => setTweak('lang', v)} />
    </TweaksPanel>
  );
}

const TWEAK_DEFAULTS = {
  theme: "light",
  layout: "topnav",
  density: "regular",
  accentKey: "#3b82f6",
  fontFamily: "mono",
  lang: "tr",
};

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [active, setActive] = useState('about');

  const lang = tweaks.lang;
  const theme = tweaks.theme;

  useEffect(() => {
    document.documentElement.dataset.theme = theme;
    document.documentElement.dataset.density = tweaks.density;
    document.documentElement.dataset.layout = tweaks.layout;
    const accent = ACCENTS[tweaks.accentKey] || ACCENTS['#3b82f6'];
    document.documentElement.style.setProperty('--accent-h', accent.h);
    if (accent.mono) {
      document.documentElement.style.setProperty('--accent', 'oklch(0.78 0 0)');
      document.documentElement.style.setProperty('--accent-soft', 'oklch(0.78 0 0 / 0.14)');
      document.documentElement.style.setProperty('--accent-fg', 'oklch(0.15 0 0)');
    } else {
      document.documentElement.style.removeProperty('--accent');
      document.documentElement.style.removeProperty('--accent-soft');
      document.documentElement.style.removeProperty('--accent-fg');
    }
    const fontMap = {
      sans: "'Inter', system-ui, sans-serif",
      serif: "'Newsreader', 'Iowan Old Style', Georgia, serif",
      mono: "'JetBrains Mono', ui-monospace, Menlo, monospace",
    };
    document.documentElement.style.setProperty('--font-body', fontMap[tweaks.fontFamily] || fontMap.sans);
  }, [theme, tweaks.density, tweaks.layout, tweaks.accentKey, tweaks.fontFamily]);

  const toggleTheme = () => setTweak('theme', tweaks.theme === 'dark' ? 'light' : 'dark');
  const setLang = (v) => setTweak('lang', v);

  const sections = [
    { id: 'about',      label: { tr: 'Hakkımda', en: 'About' } },
    { id: 'education',  label: { tr: 'Eğitim',   en: 'Education' } },
    { id: 'experience', label: { tr: 'Deneyim',  en: 'Experience' } },
    { id: 'volunteer',      label: { tr: 'Gönüllü',      en: 'Volunteer' } },
    { id: 'technologies',  label: { tr: 'Teknolojiler', en: 'Technologies' } },
    { id: 'projects',      label: { tr: 'Projeler',     en: 'Projects' } },
    { id: 'articles',      label: { tr: 'Makaleler',    en: 'Articles' } },
  ];

  useEffect(() => {
    const els = sections.map((s) => document.getElementById(s.id)).filter(Boolean);
    if (!els.length) return;
    const io = new IntersectionObserver(
      (entries) => {
        const visible = entries.filter((e) => e.isIntersecting)
          .sort((a, b) => a.boundingClientRect.top - b.boundingClientRect.top);
        if (visible[0]) setActive(visible[0].target.id);
      },
      { rootMargin: '-30% 0px -55% 0px', threshold: 0.01 }
    );
    els.forEach((el) => io.observe(el));
    return () => io.disconnect();
  }, [tweaks.layout]);

  useEffect(() => {
    const els = document.querySelectorAll('.reveal');
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e) => {
        if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); }
      });
    }, { threshold: 0.08 });
    els.forEach((el) => io.observe(el));
    return () => io.disconnect();
  }, [lang, tweaks.layout]);

  const content = (
    <>
      <Hero lang={lang} layout={tweaks.layout} />
      <About lang={lang} />
      <Education lang={lang} />
      <Experience lang={lang} />
      <Volunteer lang={lang} />
      <Technologies lang={lang} />
      <Projects lang={lang} />
      <Articles lang={lang} />
      <Foot lang={lang} />
    </>
  );

  return (
    <>
      {tweaks.layout === 'sidebar' ? (
        <div className="page-shell">
          <Sidebar active={active} lang={lang} setLang={setLang} theme={theme} toggleTheme={toggleTheme} sections={sections} />
          <main className="main-content"><div className="wrap">{content}</div></main>
        </div>
      ) : (
        <>
          <TopNav active={active} lang={lang} setLang={setLang} theme={theme} toggleTheme={toggleTheme} sections={sections} />
          <main>{content}</main>
        </>
      )}
      <Toast />
      <PortfolioTweaks tweaks={tweaks} setTweak={setTweak} />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
